name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install httpx>=0.27 rich>=13.0
          pip install pytest>=8.0 pytest-asyncio>=0.23 pytest-cov>=5.0

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=src --cov-report=term-missing --cov-report=xml -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: |
          pip install --upgrade pip
          pip install ruff mypy httpx rich

      - name: Run ruff
        run: ruff check src/ tests/ examples/

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t multi-agent-economy:ci .

      - name: Verify image runs (demo mode, no real API key)
        run: |
          docker run --rm \
            -e MAINLAYER_API_KEY=ci_test_key \
            multi-agent-economy:ci \
            python -c "from src.economy import AgentEconomy, EconomyConfig; print('Import OK')"
